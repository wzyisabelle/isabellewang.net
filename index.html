  <link rel="stylesheet" href="styles.css" />
  <style>
    body { padding-top: 96px; }  /* 80px nav + 16px = same as grid gap ← edit here */

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* ← number of columns */
      gap: 16px;                              /* ← gap between squares */
      max-width: 1400px;                      /* ← overall width (larger = bigger squares) */
      margin: 0 auto;
    }

    .work {
      position: relative;
      aspect-ratio: 1 / 1;
      background: #d8d8d8;
      display: block;
      text-decoration: none;
      overflow: hidden;
    }

    .work-cover {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 50%; /* adjust x% y% to reframe */
    }

    .work-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      text-align: center;
      padding: 16px;
    }

    .work:hover .work-overlay {
      opacity: 1;
    }

    .work-overlay .title {
      font-size: 16px;
      margin-bottom: 6px;
    }

    .work-overlay .meta {
      font-size: 13px;
    }

    @media (max-width: 700px) {
      body { padding: 32px; }
      .grid { grid-template-columns: 1fr; gap: 16px; }
    }
  </style>
</head>
